<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ENGLEAD Phrasebook No.002 Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: "Helvetica Neue", sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#toolbar {
  background: #1a1a1a;
  border-bottom: 1px solid #333;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
#counter { color: #fff; font-size: 13px; font-weight: 700; min-width: 80px; }
#title { color: #aaa; font-size: 12px; flex: 1; }
.btn {
  background: #333;
  color: #fff;
  border: none;
  padding: 6px 18px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
}
.btn:hover { background: #E07A3A; color: #fff; }
.btn:disabled { opacity: 0.3; cursor: default; }
#hint { color: #555; font-size: 11px; }
#frame-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #222;
  overflow: hidden;
  padding: 12px;
}
iframe {
  width: 1123px;
  height: 794px;
  border: none;
  transform-origin: top left;
  display: block;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div id="toolbar">
  <button class="btn" id="btn-prev">&#8592; Prev</button>
  <button class="btn" id="btn-next">Next &#8594;</button>
  <span id="counter"></span>
  <span id="title"></span>
  <span id="hint">← → キーでも操作できます</span>
</div>
<div id="frame-wrap">
  <iframe id="slide" src=""></iframe>
</div>

<script>
var slides = [
  { file: 'cover.html',       label: '表紙' },
  { file: 'howto.html',       label: '使い方ガイド' },
  { file: 'phrase-01.html',   label: '01 電話に出る・取り次ぐ — フレーズ' },
  { file: 'roleplay-01.html', label: '01 電話に出る・取り次ぐ — ロールプレイ' },
  { file: 'phrase-02.html',   label: '02 用件を聞く・確認する — フレーズ' },
  { file: 'roleplay-02.html', label: '02 用件を聞く・確認する — ロールプレイ' },
  { file: 'phrase-03.html',   label: '03 伝言を残す・受ける — フレーズ' },
  { file: 'roleplay-03.html', label: '03 伝言を残す・受ける — ロールプレイ' },
  { file: 'phrase-04.html',   label: '04 かけ直す・後で連絡する — フレーズ' },
  { file: 'roleplay-04.html', label: '04 かけ直す・後で連絡する — ロールプレイ' },
  { file: 'phrase-05.html',   label: '05 国際電話をかける — フレーズ' },
  { file: 'roleplay-05.html', label: '05 国際電話をかける — ロールプレイ' },
  { file: 'phrase-06.html',   label: '06 急ぎ・緊急の連絡 — フレーズ' },
  { file: 'roleplay-06.html', label: '06 急ぎ・緊急の連絡 — ロールプレイ' },
  { file: 'phrase-07.html',   label: '07 頼む・お願いをする — フレーズ' },
  { file: 'roleplay-07.html', label: '07 頼む・お願いをする — ロールプレイ' },
  { file: 'phrase-08.html',   label: '08 聞き取れないとき — フレーズ' },
  { file: 'roleplay-08.html', label: '08 聞き取れないとき — ロールプレイ' },
  { file: 'phrase-09.html',   label: '09 休日・手が離せないとき — フレーズ' },
  { file: 'roleplay-09.html', label: '09 休日・手が離せないとき — ロールプレイ' },
  { file: 'phrase-10.html',   label: '10 電話を締める — フレーズ' },
  { file: 'roleplay-10.html', label: '10 電話を締める — ロールプレイ' },
  { file: 'cta.html',         label: '無料カウンセリングのご案内' }
];

var current = 0;
var iframe = document.getElementById('slide');
var counter = document.getElementById('counter');
var title = document.getElementById('title');
var btnPrev = document.getElementById('btn-prev');
var btnNext = document.getElementById('btn-next');

function scale() {
  var wrap = document.getElementById('frame-wrap');
  var availW = wrap.clientWidth - 24;
  var availH = wrap.clientHeight - 24;
  var s = Math.min(availW / 1123, availH / 794);
  iframe.style.transform = 'scale(' + s + ')';
  iframe.style.marginLeft = ((availW - 1123 * s) / 2) + 'px';
  iframe.style.marginTop = ((availH - 794 * s) / 2) + 'px';
}

function goTo(n) {
  current = n;
  iframe.src = slides[current].file;
  counter.textContent = (current + 1) + ' / ' + slides.length;
  title.textContent = slides[current].label;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === slides.length - 1;
}

btnPrev.addEventListener('click', function() { if (current > 0) goTo(current - 1); });
btnNext.addEventListener('click', function() { if (current < slides.length - 1) goTo(current + 1); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < slides.length - 1) goTo(current + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (current > 0) goTo(current - 1); }
});

window.addEventListener('resize', scale);
goTo(0);
setTimeout(scale, 100);
iframe.addEventListener('load', scale);
</script>
</body>
</html>
